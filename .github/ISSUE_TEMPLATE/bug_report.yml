name: Bug report
description: Signaler un dysfonctionnement
title: "[Bug] "
labels: ["bug"]
body:
  - type: dropdown
    id: component
    attributes:
      label: Composant
      options:
        - App macOS (barre de menus)
        - Extension Raycast
        - Script install.sh
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: Que s'est-il passé ? Que attendiez-vous ?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Étapes pour reproduire
      placeholder: |
        1. Ouvrir CFPurge
        2. Cliquer sur…
        3. Observer l'erreur
    validations:
      required: true

  - type: input
    id: macos
    attributes:
      label: Version macOS
      placeholder: "ex. 14.5"
    validations:
      required: true

  - type: input
    id: cfpurge
    attributes:
      label: Version CFPurge
      placeholder: "ex. commit SHA ou date de build"

  - type: textarea
    id: logs
    attributes:
      label: Messages d'erreur
      description: Copiez le message affiché dans l'app ou la console
