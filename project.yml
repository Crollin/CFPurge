name: CFPurge
options:
  bundleIdPrefix: com.creactiveweb
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0.4"
    CURRENT_PROJECT_VERSION: "4"
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
targets:
  CFPurge:
    type: application
    platform: macOS
    sources:
      - path: CFPurge
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.creactiveweb.cfpurge
        PRODUCT_NAME: CFPurge
        INFOPLIST_FILE: CFPurge/Info.plist
        CODE_SIGN_ENTITLEMENTS: CFPurge/CFPurge.entitlements
        GENERATE_INFOPLIST_FILE: NO
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Manual
        DEVELOPMENT_TEAM: ""
  CFPurgeTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: CFPurgeTests
    dependencies:
      - target: CFPurge
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Manual
schemes:
  CFPurge:
    build:
      targets:
        CFPurge: all
    test:
      targets:
        - CFPurgeTests
